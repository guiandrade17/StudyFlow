<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Flow</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}
input, button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}
button {
    background: #22c55e;
    color: white;
    cursor: pointer;
}
button:hover {
    background: #16a34a;
}
.resultado, .historico {
    margin-top: 20px;
    background: #334155;
    padding: 15px;
    border-radius: 10px;
}
.historico-item {
    font-size: 14px;
    margin: 5px 0;
    border-bottom: 1px solid #475569;
    padding-bottom: 5px;
}
.limpar {
    background: #ef4444;
}
.limpar:hover {
    background: #dc2626;
}
</style>
</head>

<body>
<div class="container">
    <h1>📚 Study Flow</h1>

    <input type="number" id="dias" placeholder="Digite os dias">
    <button onclick="calcular()">Calcular</button>

    <div id="resultado" class="resultado"></div>

    <div class="historico">
        <h3>📜 Histórico</h3>
        <div id="listaHistorico"></div>
        <button class="limpar" onclick="limparHistorico()">Limpar histórico</button>
    </div>
</div>

<script>
const frasesPadrao = [
    "Continue estudando 🚀",
    "Você está no caminho certo 💪",
    "Consistência é a chave 🔑",
    "Pequenos passos todos os dias 👣",
    "Foco no objetivo 🎯",
    "Nunca desista 📚",
    "Seu esforço vai valer a pena ✨"
];

async function calcular() {
    const dias = document.getElementById("dias").value;

    if (!dias || dias < 0) {
        alert("Digite um valor válido");
        return;
    }

    const hoje = new Date();
    hoje.setDate(hoje.getDate() + parseInt(dias));

    // Frase local inicial
    let frase = frasesPadrao[Math.floor(Math.random() * frasesPadrao.length)];

    // Mostra resultado imediato
    document.getElementById("resultado").innerHTML = `
        <p><strong>Próxima revisão:</strong><br>${hoje.toLocaleString()}</p>
        <p id="frase">⏳ Buscando frase...</p>
    `;

    try {
        const resposta = await fetch("https://api.quotable.io/random");
        const dados = await resposta.json();
        frase = dados.content;
    } catch {
        // Mantém frase local se API falhar
    }

    // Atualiza frase
    document.getElementById("frase").innerText = frase;

    salvarHistorico(dias, hoje, frase);
    mostrarHistorico();
}

function salvarHistorico(dias, data, frase) {
    const historico = JSON.parse(localStorage.getItem("historico")) || [];

    historico.push({
        dias,
        data: data.toLocaleString(),
        frase
    });

    localStorage.setItem("historico", JSON.stringify(historico));
}

function mostrarHistorico() {
    const historico = JSON.parse(localStorage.getItem("historico")) || [];
    const lista = document.getElementById("listaHistorico");

    lista.innerHTML = "";

    historico.slice(-5).reverse().forEach(item => {
        lista.innerHTML += `
            <div class="historico-item">
                ⏱ ${item.dias} dias → ${item.data}<br>
                💬 ${item.frase}
            </div>
        `;
    });
}

function limparHistorico() {
    localStorage.removeItem("historico");
    mostrarHistorico();
}

// Carrega histórico ao abrir
mostrarHistorico();
</script>

</body>
</html>
